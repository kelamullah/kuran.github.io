<!DOCTYPE html>
<html lang="tr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kur'ân-ı Kerîm</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z'/%3E%3Cpath d='M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z'/%3E%3C/svg%3E" type="image/svg+xml">

    <!-- Tailwind CSS ve Gece Modu Ayarı -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Gece modunu class ile kontrol et
            theme: { extend: {} }
        }
        // Sayfa yüklenirken parlama (FOUC) olmaması için anında tema kontrolü
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <!-- React PRODUCTION -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- GÜNCELLEME: Babel 6 yerine modern sözdizimini (?. gibi) destekleyen Babel 7 eklendi -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ÖZEL FONTLAR YÜKLENİYOR */
        @font-face {
            font-family: 'Abay';
            src: local('Abay'), url('KuranKerimFontAbay.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Latif';
            src: local('Latif'), url('KuranKerimFontLatif.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Hamdullah';
            src: local('Hamdullah'), url('KuranKerimFontHamdullah.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* Font Sınıfları */
        .font-arabic-abay { font-family: 'Abay', 'Amiri', serif; }
        .font-arabic-latif { font-family: 'Latif', 'Amiri', serif; }
        .font-arabic-hamdullah { font-family: 'Hamdullah', 'Amiri', serif; }
        .font-arabic-amiri { font-family: 'Amiri', serif; } /* Varsayılan Google Font */

        .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
        
        /* Dark Mode Scrollbar */
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748B; }

        /* Mushaf Modu için Gelişmiş Ayarlar */
        .mushaf-page {
            background-color: #fdfcf8;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.03);
            border: 1px solid #e5e7eb;
        }
        .dark .mushaf-page {
            background-color: #0f172a;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.4);
            border: 1px solid #1e293b;
        }
        .mushaf-layout {
            text-align: justify;
            text-justify: inter-word; /* Metni kelimeler arasını açarak tam yaslar */
            text-align-last: center; /* Son satırı ortalar */
            line-height: 2.6 !important; /* Ferah satır aralığı */
            direction: rtl;
        }
        .ayah-marker {
            display: inline-block;
            white-space: nowrap; /* Parantez ve numaranın bölünmesini engeller */
            margin: 0 0.3rem;
            user-select: none;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(1rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInLeft { from { transform: translateX(-1rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-in-from-bottom-4 { animation: slideInBottom 0.4s ease-out forwards; }
        .slide-in-from-right-4 { animation: slideInRight 0.4s ease-out forwards; }
        .slide-in-from-left-4 { animation: slideInLeft 0.4s ease-out forwards; }
        .zoom-in-95 { animation: zoomIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#FDFDFD] dark:bg-slate-950 font-sans text-gray-900 dark:text-gray-100 overflow-hidden selection:bg-emerald-100 dark:selection:bg-emerald-900/50 selection:text-emerald-900 dark:selection:text-emerald-100 transition-colors duration-300">
    <div id="root" class="h-screen w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, memo, Fragment, useRef } = React;

        // İKONLAR
        const createIcon = (paths) => ({ className, title, onClick }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} onClick={onClick} dangerouslySetInnerHTML={{ __html: (title ? `<title>${title}</title>` : '') + paths }} />
        );
        const BookOpen = createIcon('<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>');
        const Search = createIcon('<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>');
        const ChevronRight = createIcon('<path d="m9 18 6-6-6-6"/>');
        const ChevronLeft = createIcon('<path d="m15 18-6-6 6-6"/>');
        const List = createIcon('<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>');
        const AlertCircle = createIcon('<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>');
        const Loader2 = createIcon('<path d="M21 12a9 9 0 1 1-6.219-8.56"/>');
        const Globe = createIcon('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>');
        const FileText = createIcon('<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>');
        const Type = createIcon('<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>');
        const Layers = createIcon('<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>');
        const ArrowRight = createIcon('<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>');
        const Copy = createIcon('<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>');
        const Check = createIcon('<polyline points="20 6 9 17 4 12"/>');
        const Hash = createIcon('<line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/>');
        const Info = createIcon('<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>');
        const Settings = createIcon('<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>');
        const Moon = createIcon('<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>');
        const Sun = createIcon('<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>');
        const AMinus = createIcon('<path d="M9 20V4l-7 16"/><path d="M4 14h8"/><line x1="16" y1="12" x2="22" y2="12"/>');
        const APlus = createIcon('<path d="M9 20V4l-7 16"/><path d="M4 14h8"/><line x1="19" y1="9" x2="19" y2="15"/><line x1="16" y1="12" x2="22" y2="12"/>');

        const API_BASE_URL = 'https://api.acikkuran.com';
        const DEFAULT_AUTHOR_ID = 105; 
        const ALLOWED_TR = ['diyanet', 'elmalılı', 'elmalili', 'ibni kesir', 'ibn kesir', 'ibn-i kesir', 'hasan basri'];
        const ALLOWED_EN = ['khattab', 'haleem', 'usmani', 'bewley', 'pickthall', 'yusuf ali', 'maududi'];

        // FONT BEDENLERİ SÖZLÜĞÜ
        const FONT_SIZES = {
            arabic: ['text-2xl', 'text-3xl', 'text-4xl', 'text-5xl', 'text-6xl'],
            translation: ['text-sm', 'text-base', 'text-lg', 'text-xl', 'text-2xl']
        };

        // FONT SEÇENEKLERİ
        const ARABIC_FONTS = [
            { id: 'abay', name: 'Abay', className: 'font-arabic-abay' },
            { id: 'latif', name: 'Latif', className: 'font-arabic-latif' },
            { id: 'hamdullah', name: 'Hamdullah', className: 'font-arabic-hamdullah' },
            { id: 'amiri', name: 'Sistem (Amiri)', className: 'font-arabic-amiri' }
        ];

        // Arapça Ayet Numarası Çevirici
        const toArabicNumber = (num) => {
            const arabicNumbers = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return num.toString().split('').map(digit => arabicNumbers[parseInt(digit)]).join('');
        };

        class ApiService {
            constructor() { this.cache = new Map(); }
            async fetch(endpoint) {
                if (this.cache.has(endpoint)) return this.cache.get(endpoint);
                try {
                    const response = await fetch(`${API_BASE_URL}${endpoint}`);
                    if (!response.ok) throw new Error(`HTTP hatası! Durum: ${response.status}`);
                    const json = await response.json();
                    const result = (json.meta || json.links) ? json : (json.data !== undefined ? json.data : json);
                    this.cache.set(endpoint, result);
                    return result;
                } catch (error) { throw error; }
            }
            getAuthors() { return this.fetch('/authors'); }
            getSurahs() { return this.fetch('/surahs'); }
            getSurah(surahId, authorId) { return this.fetch(`/surah/${surahId}?author=${authorId}`); }
            getVerse(surahId, verseNum, authorId) { return this.fetch(`/surah/${surahId}/verse/${verseNum}?author=${authorId}`); }
            getVerseTranslations(surahId, verseNum) { return this.fetch(`/surah/${surahId}/verse/${verseNum}/translations`); }
            getVerseWords(surahId, verseNum) { return this.fetch(`/surah/${surahId}/verse/${verseNum}/words`); }
            getVerseParts(surahId, verseNum) { return this.fetch(`/surah/${surahId}/verse/${verseNum}/verseparts`); }
            getRootchars() { return this.fetch('/rootchars'); }
            getRootsByChar(charId) { return this.fetch(`/rootchar/${charId}`); }
            getRootByLatin(latinChars) { return this.fetch(`/root/latin/${latinChars}`); }
            getRootVerseParts(latinChars, page, authorId) { return this.fetch(`/root/latin/${latinChars}/verseparts?page=${page}&author=${authorId}`); }
            getPage(pageNum, authorId) { return this.fetch(`/page/${pageNum}?author_id=${authorId}`); }
            search(query, authorId) { return this.fetch(`/search?q=${encodeURIComponent(query)}&author=${authorId}`); }
        }
        const api = new ApiService();

        // ==========================================
        // YARDIMCI BİLEŞENLER
        // ==========================================
        
        // Klasik Alt Alta Çevirili Görünüm (Meal Modu)
        const VerseCard = memo(({ verse, onDetailClick, hideActions = false, sizes }) => {
            const [copied, setCopied] = useState(false);
            const { arabicSize, transSize, arabicFontClass } = sizes;

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch (err) {}
                document.body.removeChild(textArea);
            };

            const translationText = verse.translation?.text || (typeof verse.translation === 'string' ? verse.translation : 'Çeviri yüklenemedi.');
            const formattedTranslation = translationText.replace(/<mark>/g, '<mark class="bg-emerald-200 dark:bg-emerald-900 dark:text-emerald-100 text-emerald-900 px-1 rounded">');

            return (
                <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-800 hover:border-emerald-200 dark:hover:border-emerald-700 transition-all mb-6 group">
                <div className="flex justify-between items-start mb-6">
                    <div className="flex flex-col items-center space-y-2">
                    {verse.surah && (
                        <span className="text-[10px] font-black text-gray-400 dark:text-slate-500 uppercase tracking-widest bg-gray-50 dark:bg-slate-800 px-2 py-1 rounded-md mb-1 text-center">
                        {verse.surah.name}<br/>{verse.verse_number}
                        </span>
                    )}
                    {!verse.surah && (
                        <span className="flex items-center justify-center w-10 h-10 rounded-full bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 text-sm font-bold border border-emerald-100 dark:border-emerald-800/50 shrink-0">
                        {verse.verse_number}
                        </span>
                    )}
                    
                    <button onClick={() => copyToClipboard(verse.verse)} className="p-2 text-gray-400 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors" title="Arapça Metni Kopyala">
                        {copied ? <Check className="w-4 h-4 text-emerald-600 dark:text-emerald-400" /> : <Copy className="w-4 h-4" />}
                    </button>
                    </div>
                    <div className="flex-1 text-right ml-4 overflow-hidden">
                    <p className={`${FONT_SIZES.arabic[arabicSize]} ${arabicFontClass} leading-loose text-gray-900 dark:text-gray-100 transition-all`} dir="rtl">
                        {verse.verse}
                    </p>
                    </div>
                </div>
                <div className="border-t border-gray-100 dark:border-slate-800 pt-4">
                    <p className={`text-gray-700 dark:text-gray-300 leading-relaxed ${FONT_SIZES.translation[transSize]} transition-all`} dangerouslySetInnerHTML={{ __html: formattedTranslation }} />
                    
                    {verse.translation?.footnotes?.length > 0 && (
                    <div className="mt-4 pt-4 border-t border-dashed border-gray-100 dark:border-slate-800 text-sm text-gray-500 dark:text-slate-400 space-y-2">
                        {verse.translation.footnotes.map((fn, idx) => (
                        <p key={fn.id || idx}><strong className="text-emerald-700 dark:text-emerald-400">[{fn.number}]</strong> {fn.text}</p>
                        ))}
                    </div>
                    )}
                </div>
                
                {!hideActions && (
                    <div className="mt-4 pt-4 border-t border-dashed border-gray-100 dark:border-slate-800 flex justify-end">
                    <button onClick={onDetailClick} className="text-sm font-medium text-emerald-600 dark:text-emerald-400 hover:text-emerald-700 dark:hover:text-emerald-300 flex items-center space-x-2 bg-emerald-50 dark:bg-emerald-900/20 px-3 py-1.5 rounded-lg transition-colors">
                        <FileText className="w-4 h-4" />
                        <span>Analiz & Diğer Çeviriler</span>
                    </button>
                    </div>
                )}
                </div>
            );
        });

        // ==========================================
        // GÖRÜNÜMLER
        // ==========================================
        const LoadingView = () => (
            <div className="flex flex-col items-center justify-center h-full space-y-4 py-20">
                <Loader2 className="w-10 h-10 text-emerald-600 animate-spin" />
                <p className="text-gray-500 dark:text-slate-400 font-medium">İçerik Yükleniyor...</p>
            </div>
        );

        const ErrorView = ({ msg, onReturnHome }) => (
            <div className="bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 p-6 rounded-2xl flex items-start space-x-3 m-8 border border-red-100 dark:border-red-900/30 max-w-2xl mx-auto">
                <AlertCircle className="w-6 h-6 flex-shrink-0 mt-0.5" />
                <div>
                <h3 className="font-bold mb-1">Bir Hata Oluştu</h3><p>{msg}</p>
                <button onClick={onReturnHome} className="mt-4 text-sm font-bold underline bg-red-100 dark:bg-red-900/50 px-4 py-2 rounded-lg hover:bg-red-200 dark:hover:bg-red-900 transition-colors">Ana Sayfaya Dön</button>
                </div>
            </div>
        );

        const HomeView = ({ navigateTo, onOpenDictionary }) => (
            <div className="p-8 max-w-4xl mx-auto text-center space-y-8 fade-in zoom-in-95">
                <div className="bg-white dark:bg-slate-900 p-12 rounded-[32px] border border-emerald-100 dark:border-slate-800 shadow-xl shadow-emerald-900/5 dark:shadow-none relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-full opacity-[0.03] dark:opacity-[0.05] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#10b981 1px, transparent 1px)', backgroundSize: '24px 24px' }}></div>
                <div className="bg-emerald-100 dark:bg-emerald-900/30 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8">
                    <BookOpen className="w-12 h-12 text-emerald-600 dark:text-emerald-400 relative z-10" />
                </div>
                <h2 className="text-4xl font-bold text-gray-900 dark:text-white mb-4 relative z-10">Kur’ân-ı Kerîm Keşif Portalı</h2>
                <p className="text-gray-600 dark:text-slate-400 text-lg max-w-lg mx-auto leading-relaxed relative z-10">
                    Kelime analizleri, kök sözlüğü ve farklı çevirilerle Kur’ân-ı Kerîm'i daha derinlemesine inceleyin.
                </p>
                <div className="mt-10 flex flex-wrap justify-center gap-4 relative z-10">
                    <button onClick={() => navigateTo({ type: 'surah', surahId: 1 })} className="px-8 py-3 bg-emerald-600 text-white rounded-2xl font-bold hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200 dark:shadow-none">Kaldığın Yerden / Fatiha</button>
                    <button onClick={onOpenDictionary} className="px-8 py-3 bg-white dark:bg-slate-800 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-slate-700 rounded-2xl font-bold hover:bg-emerald-50 dark:hover:bg-slate-700 transition-all">Kök Sözlüğü</button>
                </div>
                </div>
            </div>
        );

        const ReadingView = ({ viewData, navigateTo, sizes, viewMode }) => {
            if (!viewData || !viewData.verses) return null;
            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 fade-in slide-in-from-bottom-4">
                
                {/* SADECE MEAL MODUNDA ÜST BİLGİ GÖSTERİLİR */}
                {viewMode === 'meal' && (
                    <div className="text-center mb-10 bg-white dark:bg-slate-900 p-10 rounded-[32px] shadow-sm border border-gray-100 dark:border-slate-800 relative overflow-hidden">
                        <h2 className="text-6xl font-arabic-amiri font-bold text-emerald-950 dark:text-emerald-500 mb-6 relative z-10">{viewData.name_original}</h2>
                        <div className="flex flex-wrap items-center justify-center gap-3 text-sm text-gray-400 dark:text-slate-500 uppercase tracking-widest font-bold mb-8 relative z-10">
                        <span className="text-emerald-600 dark:text-emerald-400">{viewData.name} Suresi</span>
                        <span className="text-gray-200 dark:text-slate-700">|</span>
                        <span>{viewData.verse_count} Ayet</span>
                        <span className="text-gray-200 dark:text-slate-700">|</span>
                        <span>Sayfa {viewData.page_number}</span>
                        </div>
                        {viewData.audio && (
                        <div className="bg-gray-50 dark:bg-slate-800 p-4 rounded-2xl flex flex-col items-center justify-center space-y-3 border border-gray-100 dark:border-slate-700 max-w-sm mx-auto shadow-inner relative z-10">
                            <audio key={viewData.audio.mp3} controls className="w-full h-10 outline-none rounded-lg dark:opacity-80">
                            <source src={viewData.audio.mp3} type="audio/mpeg" />
                            </audio>
                        </div>
                        )}
                    </div>
                )}

                {viewMode === 'meal' && viewData.zero && (

                        key={verse.id} 
                        verse={verse} 
                        onDetailClick={() => navigateTo({ type: 'verse_detail', surahId: verse.surah?.id, verseNum: verse.verse_number })} 
                        sizes={sizes}
                        />
                    ))}
                    </div>
                )}
                </div>
            );
        };

        const Sidebar = ({ sidebarOpen, setSidebarOpen, navTab, setNavTab, surahs, viewState, navigateTo, rootChars, charRoots, setCharRoots, loadRootsForChar, sizes }) => (
            <aside className={`fixed lg:static inset-y-0 left-0 z-40 w-80 bg-gray-50 dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 transform transition-transform duration-300 ease-in-out flex flex-col ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                <div className="flex border-b border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 mt-16 lg:mt-0">
                {['surahs', 'pages', 'dictionary'].map(tab => (
                    <button 
                    key={tab}
                    className={`flex-1 py-4 text-xs font-bold uppercase tracking-wider transition-all ${navTab === tab ? 'text-emerald-700 dark:text-emerald-400 border-b-2 border-emerald-600 dark:border-emerald-500 bg-emerald-50/50 dark:bg-slate-800' : 'text-gray-400 dark:text-slate-500 hover:bg-gray-50 dark:hover:bg-slate-800'}`} 
                    onClick={() => setNavTab(tab)}
                    >
                    {tab === 'surahs' ? 'Sure' : tab === 'pages' ? 'Sayfa' : 'Sözlük'}
                    </button>
                ))}
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar">
                {navTab === 'surahs' && (
                    <div className="p-2 space-y-1">
                    {surahs?.map((surah) => {
                        const isActive = viewState.type === 'surah' && viewState.surahId === surah.id;
                        return (
                        <button key={surah.id} onClick={() => navigateTo({ type: 'surah', surahId: surah.id }, true)} className={`w-full text-left px-4 py-3 rounded-xl flex items-center justify-between transition-all ${isActive ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-100 font-medium shadow-inner' : 'hover:bg-white dark:hover:bg-slate-800 text-gray-700 dark:text-slate-300 hover:shadow-sm'}`}>
                            <div className="flex items-center space-x-3">
                            <span className={`flex items-center justify-center w-8 h-8 rounded-full text-xs font-bold border ${isActive ? 'bg-emerald-600 dark:bg-emerald-700 text-white border-emerald-700 dark:border-emerald-600' : 'bg-emerald-50 dark:bg-slate-800 text-emerald-600 dark:text-emerald-500 border-emerald-100 dark:border-slate-700'}`}>{surah.id}</span>
                            <div>
                                <div className="text-sm font-semibold">{surah.name}</div>
                                <div className="text-xs text-gray-500 dark:text-slate-500 opacity-80">{surah.verse_count} Ayet</div>
                            </div>
                            </div>
                            <div className={`text-xl font-arabic-amiri ${isActive ? 'text-emerald-800 dark:text-emerald-400' : 'text-gray-400 dark:text-slate-600'}`}>{surah.name_original}</div>
                        </button>
                        )
                    })}
                    </div>
                )}

                {navTab === 'pages' && (
                    <div className="p-4">
                    <div className="mb-4 flex space-x-2">
                        <input type="number" id="pageJump" min="1" max="604" placeholder="Sayfa (1-604)" className="flex-1 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-emerald-500" onKeyDown={(e) => { if(e.key === 'Enter' && e.target.value) navigateTo({ type: 'page', pageNum: parseInt(e.target.value) }, true) }} />
                        <button onClick={() => { const val = document.getElementById('pageJump').value; if(val) navigateTo({ type: 'page', pageNum: parseInt(val) }, true); }} className="bg-emerald-600 dark:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 dark:hover:bg-emerald-600 transition-colors">Git</button>
                    </div>
                    <div className="grid grid-cols-4 gap-2">
                        {Array.from({length: 604}, (_, i) => i + 1).map(p => {
                        const isActive = viewState.type === 'page' && viewState.pageNum === p;
                        return (
                            <button key={p} onClick={()=>navigateTo({ type: 'page', pageNum: p }, true)} className={`p-2 text-xs border rounded-lg transition-all ${isActive ? 'bg-emerald-600 text-white border-emerald-600 dark:bg-emerald-700 dark:border-emerald-700 font-bold shadow-md' : 'bg-white dark:bg-slate-800 border-gray-200 dark:border-slate-700 text-gray-600 dark:text-slate-300 hover:bg-emerald-50 dark:hover:bg-slate-700 hover:border-emerald-200 dark:hover:border-slate-600'}`}>
                            {p}
                            </button>
                        )
                        })}
                    </div>
                    </div>
                )}

                {navTab === 'dictionary' && (
                    <div className="p-4">
                    {charRoots ? (
                        <div className="fade-in slide-in-from-left-2 duration-300">
                        <button onClick={() => setCharRoots(null)} className="mb-4 text-sm font-medium text-emerald-600 dark:text-emerald-400 hover:text-emerald-800 dark:hover:text-emerald-300 flex items-center bg-emerald-50 dark:bg-emerald-900/30 px-3 py-1.5 rounded-lg w-fit transition-colors">
                            <ChevronLeft className="w-4 h-4 mr-1"/> Harflere Dön
                        </button>
                        <div className="space-y-2">
                            {charRoots.roots?.map(root => (
                            <button key={root.id} onClick={()=>navigateTo({ type: 'root_detail', latin: root.latin, page: 1 }, true)} className="w-full text-left px-4 py-3 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-transparent hover:border-emerald-200 dark:hover:border-slate-600 flex justify-between items-center transition-all group">
                                <span className="font-bold text-gray-700 dark:text-slate-300 text-lg group-hover:text-emerald-700 dark:group-hover:text-emerald-400">{root.latin}</span>
                                <span className={`${sizes.arabicFontClass} text-2xl text-emerald-800 dark:text-emerald-500`}>{root.arabic}</span>
                            </button>
                            ))}
                        </div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-4 gap-3" dir="rtl">
                        {rootChars?.map(char => (
                            <button key={char.id} onClick={()=>loadRootsForChar(char.id)} className={`p-3 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl hover:border-emerald-400 dark:hover:border-emerald-500 hover:text-emerald-700 dark:hover:text-emerald-400 hover:shadow-md ${sizes.arabicFontClass} text-3xl text-gray-800 dark:text-slate-200 transition-all flex items-center justify-center h-14`}>
                            {char.arabic}
                            </button>
                        ))}
                        </div>
                    )}
                    </div>
                )}
                </div>
            </aside>
        );

        // ==========================================
        // ANA UYGULAMA (APP) BİLEŞENİ
        // ==========================================
        function App() {
            const [authors, setAuthors] = useState([]);
            const [surahs, setSurahs] = useState([]);
            const [rootChars, setRootChars] = useState([]);
            const [selectedAuthor, setSelectedAuthor] = useState(DEFAULT_AUTHOR_ID);
            
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [navTab, setNavTab] = useState('surahs'); 
            const [charRoots, setCharRoots] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const settingsRef = useRef(null);
            
            // --- AYARLAR (State) ---
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches));
            const [arabicSize, setArabicSize] = useState(() => parseInt(localStorage.getItem('arabicSize')) || 1); // Varsayılan: text-3xl
            const [transSize, setTransSize] = useState(() => parseInt(localStorage.getItem('transSize')) || 2); // Varsayılan: text-lg
            const [arabicFontId, setArabicFontId] = useState(() => localStorage.getItem('arabicFontId') || 'abay'); // Varsayılan: Abay
            const [viewMode, setViewMode] = useState(() => localStorage.getItem('viewMode') || 'meal'); // 'meal' veya 'mushaf'
            
            const activeArabicFontClass = ARABIC_FONTS.find(f => f.id === arabicFontId)?.className || 'font-arabic-abay';
            const currentSizes = { arabicSize, transSize, arabicFontClass: activeArabicFontClass };

            // Ayarları Kaydetme
            useEffect(() => {
                if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [darkMode]);
            useEffect(() => { localStorage.setItem('arabicSize', arabicSize); }, [arabicSize]);
            useEffect(() => { localStorage.setItem('transSize', transSize); }, [transSize]);
            useEffect(() => { localStorage.setItem('arabicFontId', arabicFontId); }, [arabicFontId]);
            useEffect(() => { localStorage.setItem('viewMode', viewMode); }, [viewMode]);

            // Dışarı tıklayınca ayarlar menüsünü kapat
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (settingsRef.current && !settingsRef.current.contains(event.target)) setShowSettings(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [settingsRef]);

            // Başlangıç state'ini History API'den VEYA LocalStorage'dan (Kaldığın Yer) oku
            const getInitialState = () => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const stateParam = params.get('state');
                    if(stateParam) return JSON.parse(decodeURIComponent(stateParam));

                    const lastRead = localStorage.getItem('lastReadState');
                    if(lastRead) return JSON.parse(lastRead);
                } catch(e) {}
                return { type: 'home' };
            };

            const [viewState, setViewState] = useState(getInitialState());
            const [viewData, setViewData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            // Geri/İleri Tuşu
            useEffect(() => {
                const handlePopState = (event) => setViewState(event.state ? event.state : { type: 'home' });
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const loadInitialData = async () => {
                try {
                    const [rawAuthorsData, surahsData, rootCharsData] = await Promise.all([api.getAuthors(), api.getSurahs(), api.getRootchars()]);
                    const filteredAuthors = (rawAuthorsData || []).filter(author => {
                        const name = author.name.toLocaleLowerCase('tr-TR');
                        const lang = author.language?.toLowerCase() || 'tr';
                        return lang === 'tr' ? ALLOWED_TR.some(k => name.includes(k)) : ALLOWED_EN.some(k => name.includes(k));
                    });
                    setAuthors(filteredAuthors); setSurahs(surahsData || []); setRootChars(rootCharsData || []);
                    if (filteredAuthors.length > 0) setSelectedAuthor(parseInt(filteredAuthors[0].id));
                } catch (err) { console.error("İlk yükleme hatası:", err); }
                };
                loadInitialData();
            }, []);

            useEffect(() => {
                let isMounted = true;
                const fetchViewData = async () => {
                if (viewState.type === 'home') return;
                setLoading(true); setError(null);
                try {
                    let data = null;
                    switch (viewState.type) {
                    case 'surah': data = await api.getSurah(viewState.surahId, selectedAuthor); break;
                    case 'page': const pageResp = await api.getPage(viewState.pageNum, selectedAuthor); data = Array.isArray(pageResp) ? pageResp : Object.values(pageResp); data.sort((a,b) => a.id - b.id); break;
                    case 'verse_detail':
                        const [fullVerse, words, translationsData, verseparts] = await Promise.all([api.getVerse(viewState.surahId, viewState.verseNum, selectedAuthor), api.getVerseWords(viewState.surahId, viewState.verseNum), api.getVerseTranslations(viewState.surahId, viewState.verseNum), api.getVerseParts(viewState.surahId, viewState.verseNum)]);
                        const filteredTranslations = (translationsData || []).filter(t => { const name = (t.author?.name || t.author || '').toLocaleLowerCase('tr-TR'); return ALLOWED_TR.some(k => name.includes(k)) || ALLOWED_EN.some(k => name.includes(k)); });
                        data = { fullVerse, words, translations: filteredTranslations, verseparts }; break;
                    case 'root_detail':
                        const detail = await api.getRootByLatin(viewState.latin);
                        const versesResp = await api.getRootVerseParts(viewState.latin, viewState.page || 1, selectedAuthor);
                        data = { detail, verses: versesResp.data, meta: versesResp.meta }; break;
                    case 'search': data = await api.search(viewState.query, selectedAuthor); break;
                    }
                    if (isMounted) setViewData(data);
                } catch (err) { if (isMounted) setError('Veri yüklenirken bir hata oluştu.'); } 
                finally { if (isMounted) setLoading(false); }
                };
                fetchViewData();
                return () => { isMounted = false; };
            }, [viewState, selectedAuthor]);

            // Navigasyon & Kaldığın Yeri Kaydetme
            const navigateTo = (newState, pushHistory = true) => {
                setSidebarOpen(false);
                setViewData(null); 
                if(pushHistory) {
                    const urlParams = new URLSearchParams();
                    urlParams.set('state', encodeURIComponent(JSON.stringify(newState)));
                    try { window.history.pushState(newState, '', '?' + urlParams.toString()); } catch (err) { console.warn('Tarayıcı geçmişi güncellenemedi.', err); }
                }
                setViewState(newState);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if(newState.type !== 'home' && newState.type !== 'search') { localStorage.setItem('lastReadState', JSON.stringify(newState)); }
            };

            const handleSearchSubmit = (e) => { e.preventDefault(); if (searchQuery.trim().length > 2) { document.activeElement.blur(); navigateTo({ type: 'search', query: searchQuery.trim() }); } };

            const loadRootsForChar = async (charId) => {
                try {
                    const roots = await api.getRootsByChar(charId);
                    setCharRoots({ charId, roots });
                } catch(err) { console.error(err); }
            };

            return (
                <div className="flex h-screen w-full relative">
                    {sidebarOpen && <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />}

                    <Sidebar sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} navTab={navTab} setNavTab={setNavTab} surahs={surahs} viewState={viewState} navigateTo={navigateTo} rootChars={rootChars} charRoots={charRoots} setCharRoots={setCharRoots} loadRootsForChar={loadRootsForChar} sizes={currentSizes} />

                    <div className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className="bg-white/90 dark:bg-slate-950/90 backdrop-blur-xl border-b border-gray-100 dark:border-slate-800 sticky top-0 z-20 px-4 py-3 flex items-center justify-between shadow-sm">
                        <div className="flex items-center space-x-3">
                            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="lg:hidden p-2 bg-gray-50 dark:bg-slate-800 hover:bg-emerald-50 dark:hover:bg-slate-700 rounded-xl text-emerald-700 dark:text-emerald-400 transition-all">
                                <List className="w-5 h-5" />
                            </button>
                            <div className="flex items-center space-x-2 text-emerald-950 dark:text-emerald-50 cursor-pointer group" onClick={() => navigateTo({ type: 'home' })}>
                            <div className="w-9 h-9 bg-emerald-600 dark:bg-emerald-700 rounded-lg flex items-center justify-center shadow-md shadow-emerald-200 dark:shadow-none group-hover:bg-emerald-700 transition-colors">
                                <BookOpen className="w-5 h-5 text-white" />
                            </div>
                            <h1 className="font-extrabold text-lg hidden sm:block tracking-tight uppercase">Kur’ân-ı<span className="text-emerald-600 dark:text-emerald-400">Kerîm</span></h1>
                            </div>
                        </div>
                        
                        <div className="flex items-center flex-1 max-w-md mx-4 hidden md:block">
                            <form onSubmit={handleSearchSubmit} className="relative w-full">
                            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Kur'an'da kelime veya meal ara..." className="w-full bg-gray-50 dark:bg-slate-900 border border-gray-100 dark:border-slate-800 text-gray-900 dark:text-white text-sm rounded-full pl-10 pr-4 py-2 outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 dark:focus:border-emerald-500 transition-all" />
                            <button type="submit" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-400">
                                <Search className="w-4 h-4" />
                            </button>
                            </form>
                        </div>
                        
                        <div className="flex items-center space-x-3">
                            <div className="relative group hidden sm:block">
                                <Globe className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-emerald-600 dark:text-emerald-500 pointer-events-none" />
                                <select value={selectedAuthor} onChange={(e) => setSelectedAuthor(parseInt(e.target.value))} className="w-full bg-emerald-50/50 dark:bg-slate-800 border border-emerald-100 dark:border-slate-700 text-emerald-900 dark:text-emerald-100 text-xs font-bold rounded-xl pl-9 pr-8 py-2.5 outline-none focus:ring-2 focus:ring-emerald-500/30 transition-all appearance-none cursor-pointer">
                                    {authors.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                </select>
                            </div>

                            {/* Ayarlar Menüsü */}
                            <div className="relative" ref={settingsRef}>
                                <button onClick={() => setShowSettings(!showSettings)} className="p-2.5 bg-gray-50 dark:bg-slate-800 hover:bg-emerald-50 dark:hover:bg-slate-700 rounded-xl text-gray-600 dark:text-slate-300 transition-all border border-transparent hover:border-emerald-200 dark:hover:border-slate-600">
                                    <Settings className="w-5 h-5" />
                                </button>
                                
                                {showSettings && (
                                    <div className="absolute right-0 mt-2 w-72 bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-gray-100 dark:border-slate-800 p-5 z-50 fade-in slide-in-from-top-2">
                                        <div className="mb-4 pb-4 border-b border-gray-100 dark:border-slate-800">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-sm font-bold text-gray-700 dark:text-slate-300">Tema</span>
                                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-300 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors">
                                                    {darkMode ? <Sun className="w-4 h-4" /> : <Moon className="w-4 h-4" />}
                                                </button>
                                            </div>
                                        </div>
                                        <div className="space-y-5">
                                            {/* GÖRÜNÜM SEÇİMİ (Yeni) */}
                                            <div>
                                                <span className="text-xs font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-2 block">Görünüm</span>
                                                <div className="flex bg-gray-50 dark:bg-slate-800 rounded-lg p-1">
                                                    <button onClick={() => setViewMode('meal')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${viewMode === 'meal' ? 'bg-white dark:bg-slate-700 shadow-sm text-emerald-700 dark:text-emerald-400' : 'text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-300'}`}>
                                                        Meal
                                                    </button>
                                                    <button onClick={() => setViewMode('mushaf')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${viewMode === 'mushaf' ? 'bg-white dark:bg-slate-700 shadow-sm text-emerald-700 dark:text-emerald-400' : 'text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-300'}`}>
                                                        Mushaf
                                                    </button>
                                                </div>
                                            </div>

                                            {/* Font Seçimi */}
                                            <div>
                                                <span className="text-xs font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-2 block">Arapça Fontu</span>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {ARABIC_FONTS.map(font => (
                                                        <button 
                                                            key={font.id} 
                                                            onClick={() => setArabicFontId(font.id)}
                                                            className={`py-2 px-3 text-xs rounded-lg border transition-colors ${arabicFontId === font.id ? 'bg-emerald-50 border-emerald-200 text-emerald-700 dark:bg-emerald-900/30 dark:border-emerald-800 dark:text-emerald-400 font-bold' : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-700'}`}
                                                        >
                                                            {font.name}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <span className="text-xs font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-2 block">Arapça Boyutu</span>
                                                <div className="flex bg-gray-50 dark:bg-slate-800 rounded-lg p-1">
                                                    <button onClick={() => setArabicSize(Math.max(0, arabicSize - 1))} className="flex-1 py-1 flex justify-center hover:bg-white dark:hover:bg-slate-700 rounded shadow-sm text-gray-600 dark:text-slate-300"><AMinus className="w-4 h-4"/></button>
                                                    <button onClick={() => setArabicSize(Math.min(FONT_SIZES.arabic.length - 1, arabicSize + 1))} className="flex-1 py-1 flex justify-center hover:bg-white dark:hover:bg-slate-700 rounded shadow-sm text-gray-600 dark:text-slate-300"><APlus className="w-4 h-4"/></button>
                                                </div>
                                            </div>
                                            
                                            {/* Sadece Meal modundaysa göster */}
                                            {viewMode === 'meal' && (
                                                <div>
                                                    <span className="text-xs font-bold text-gray-400 dark:text-slate-500 uppercase tracking-wider mb-2 block">Meal Boyutu</span>
                                                    <div className="flex bg-gray-50 dark:bg-slate-800 rounded-lg p-1">
                                                        <button onClick={() => setTransSize(Math.max(0, transSize - 1))} className="flex-1 py-1 flex justify-center hover:bg-white dark:hover:bg-slate-700 rounded shadow-sm text-gray-600 dark:text-slate-300"><AMinus className="w-4 h-4"/></button>
                                                        <button onClick={() => setTransSize(Math.min(FONT_SIZES.translation.length - 1, transSize + 1))} className="flex-1 py-1 flex justify-center hover:bg-white dark:hover:bg-slate-700 rounded shadow-sm text-gray-600 dark:text-slate-300"><APlus className="w-4 h-4"/></button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        </header>

                        <main className="flex-1 overflow-y-auto custom-scrollbar relative bg-[#fafafa]/50 dark:bg-slate-950 transition-colors">
                        {loading ? <LoadingView /> : error ? <ErrorView msg={error} onReturnHome={() => navigateTo({type: 'home'})} /> : (
                            <div className="pb-20">
                            {viewState.type === 'home' && <HomeView navigateTo={navigateTo} onOpenDictionary={() => { setSidebarOpen(true); setNavTab('dictionary'); }} />}
                            {viewState.type === 'surah' && <ReadingView viewData={viewData} navigateTo={navigateTo} sizes={currentSizes} viewMode={viewMode} />}
                            {viewState.type === 'page' && <PageReadingView viewData={viewData} viewState={viewState} navigateTo={navigateTo} sizes={currentSizes} viewMode={viewMode} />}
                            {viewState.type === 'verse_detail' && <VerseDetailView viewData={viewData} viewState={viewState} navigateTo={navigateTo} sizes={currentSizes} />}
                            {viewState.type === 'root_detail' && <RootDetailView viewData={viewData} viewState={viewState} navigateTo={navigateTo} sizes={currentSizes} />}
                            {viewState.type === 'search' && <SearchView viewData={viewData} viewState={viewState} navigateTo={navigateTo} sizes={currentSizes} />}
                            </div>
                        )}
                        </main>
                    </div>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
